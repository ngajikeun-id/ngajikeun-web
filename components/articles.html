<section id="article-section" class="py-24 bg-slate-950">
    <div class="max-w-6xl mx-auto px-6 mb-12">
        <div class="flex flex-col items-center text-center gap-6">
            <div class="max-w-2xl">
                <span class="text-emerald-400 font-bold tracking-widest text-[10px] uppercase block">Wawasan &
                    Literasi</span>
                <h2 class="text-4xl font-black text-slate-100 mt-2 tracking-tighter">Artikel Terbaru</h2>
                <p class="text-slate-400 text-sm mt-3">Update informasi seputar dunia Al-Qur'an dan tips belajar
                    makhraj.</p>
            </div>

            <button id="btn-show-all" onclick="toggleAllArticles()"
                class="text-xs font-bold text-emerald-400 hover:text-emerald-300 transition-colors border-b-2 border-emerald-500/30 pb-1 whitespace-nowrap">
                Lihat Semua Artikel →
            </button>
        </div>
    </div>

    <div id="articles-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto px-4 sm:px-6">
        <!-- Loading State -->
        <div class="col-span-full text-center py-20 text-slate-400 italic">
            <div class="flex justify-center mb-4">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce mx-1"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce mx-1 [animation-delay:-0.15s]"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce mx-1 [animation-delay:-0.3s]"></div>
            </div>
            <p class="text-xs tracking-widest uppercase font-medium">Menarik data literasi...</p>
        </div>
    </div>
</section>
