<section id="product-container"
    class="max-w-7xl mx-auto px-4 py-12 bg-slate-950 rounded-3xl shadow-sm border border-slate-800 mb-12 scroll-mt-24">
    <h2 class="text-3xl font-bold text-center text-slate-100 mb-10">Produk & E-Book</h2>

    <div id="products-list" class="flex flex-col gap-6">
        <div class="text-center py-10 text-gray-400 italic">
            Memuat koleksi produk & e-book...
        </div>
    </div>
</section>

<div id="product-modal"
    class="fixed inset-0 z-[9999] hidden bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4">

    <div
        class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transform transition-all max-h-[85vh] overflow-y-auto custom-scroll relative mt-24">
        <div class="absolute top-4 right-4 z-50">
            <button onclick="window.closeProductModal()"
                class="text-slate-400 hover:text-emerald-400 p-2 bg-slate-950/60 hover:bg-slate-800 backdrop-blur-sm rounded-xl transition-all border border-slate-800/50 shadow-lg"
                type="button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div id="product-modal-content" class="p-6 pt-12 space-y-4">
            <div class="flex flex-col items-center text-center space-y-3">
                <div
                    class="h-32 w-32 rounded-2xl overflow-hidden ring-4 ring-emerald-500/30 shadow-md bg-slate-950 flex items-center justify-center transition-all duration-300 relative">
                    <img id="modal-product-img" src="" alt=""
                        class="h-20 w-20 object-contain transition-all duration-300">
                </div>

                <h3 id="modal-product-title" class="text-xl font-bold text-slate-100 px-4"></h3>
                <span id="modal-product-category"
                    class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs font-semibold px-3 py-1 rounded-full"></span>

                <div class="w-full max-w-[200px] my-2 p-3 bg-slate-950 rounded-2xl border border-slate-800 text-center">
                    <span
                        class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Investasi</span>
                    <p id="modal-product-price" class="text-xl font-black text-emerald-400"></p>
                </div>
            </div>

            <div class="border-t border-slate-800/80 pt-4">
                <h4 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2">Deskripsi Lengkap</h4>
                <div id="modal-product-description"
                    class="text-xs text-slate-300 leading-relaxed max-h-[24vh] overflow-y-auto custom-scroll pr-1">
                </div>
            </div>
        </div>
    </div>
