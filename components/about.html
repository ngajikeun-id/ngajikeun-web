<section id="about-container" class="py-20 md:py-24 bg-slate-50 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-20 bg-gradient-to-b from-emerald-700/5 to-transparent"></div>
    <div class="absolute -right-20 top-1/2 -translate-y-1/2 w-64 h-64 bg-emerald-100/30 rounded-full blur-3xl"></div>

    <div class="max-w-7xl mx-auto px-6 relative z-10">
        <!-- HEADER -->
        <div class="text-center max-w-3xl mx-auto mb-12 md:mb-14" data-aos="fade-up">
            <span
                class="inline-block bg-emerald-100 text-emerald-700 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] mb-4">
                Tentang Kami
            </span>
            <h2 class="text-3xl md:text-5xl font-bold text-slate-800 tracking-tight leading-tight">
                Menghidupkan Al-Qur'an <br>
                <span class="text-emerald-600">Sebelum Kematian Menghampiri</span>
            </h2>
        </div>

        <!-- CONTENT -->
        <div class="grid lg:grid-cols-[minmax(0,1.15fr)_minmax(320px,0.85fr)] gap-10 lg:gap-12 items-start">

            <!-- LEFT -->
            <div class="space-y-6 md:space-y-8" data-aos="fade-right">
                <div id="history-container" class="about-story prose max-w-none">
                    <div id="about-history">Memuat sejarah...</div>
                </div>

                <div
                    class="inline-flex items-center gap-2 rounded-full border border-emerald-100 bg-white px-4 py-2 text-[10px] text-slate-400 font-mono tracking-widest uppercase shadow-sm">
                    <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
                    Legalitas: <span id="about-legal" class="font-bold text-slate-600">—</span>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="space-y-6">

                <!-- CARD VISI MISI -->
                <div class="bg-white p-8 md:p-10 rounded-[2rem] border border-emerald-50 shadow-2xl shadow-emerald-900/5 relative lg:sticky lg:top-28"
                    data-aos="fade-left">

                    <!-- ICON -->
                    <div class="absolute -top-4 -right-4 bg-emerald-600 text-white p-3 rounded-2xl shadow-lg rotate-12">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>

                    <h3 class="text-2xl font-bold text-emerald-900 mb-6 border-b border-emerald-50 pb-4">
                        Visi & Misi
                    </h3>

                    <!-- SCROLL AREA -->
                    <div class="max-h-[320px] overflow-y-auto pr-2 space-y-6 custom-scroll">
                        <!-- VISI -->
                        <div>
                            <p class="text-xs md:text-sm font-semibold text-emerald-700 mb-1">Visi</p>
                            <p id="about-vision" class="text-xs md:text-sm italic text-slate-500">
                                Memuat visi...
                            </p>
                        </div>

                        <!-- MISI -->
                        <div class="space-y-3">
                            <p class="text-xs md:text-sm font-semibold text-emerald-700">Misi</p>
                            <div id="about-missions" class="space-y-3">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 md:mt-16 overflow-hidden rounded-2xl border border-emerald-100 bg-emerald-50/60">
                    <div id="about-slides" class="grid grid-cols-2 md:grid-cols-4 gap-4 transition-all duration-500">
                        <p class="p-10 text-center text-emerald-600/50 w-full">Memuat galeri...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
