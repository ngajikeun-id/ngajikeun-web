<section id="mentor-section" class="py-16 bg-slate-950 scroll-mt-24">
    <div class="max-w-6xl mx-auto px-4">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-gray-100">Mengenal Mentor Kami</h2>
            <p class="text-lg italic text-slate-300">"Dibimbing langsung oleh mentor bersanad hingga tingkatan ke-29
                dari Rasulullah SAW"</p>
        </div>

        <div id="mentor-container" class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-10 text-gray-400 italic">
                Memuat profil asatidzah...
            </div>
        </div>
    </div>
</section>

<div id="mentor-modal"
    class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div
        class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto custom-scroll">

        <div class="p-4 border-b border-slate-800 flex justify-end">
            <button onclick="window.closeMentorModal()"
                class="text-slate-400 hover:text-emerald-400 p-1 hover:bg-slate-800 rounded-lg transition-all"
                type="button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div id="mentor-modal-content" class="p-6 space-y-4">
            <div class="flex flex-col items-center text-center space-y-3">
                <div id="mentor-img-container"
                    class="h-28 w-28 rounded-full overflow-hidden ring-4 ring-emerald-500/30 shadow-md bg-slate-950 flex items-center justify-center transition-all duration-300 relative">
                    <img id="modal-mentor-img" src="" alt="" onclick="window.toggleMentorImageZoom(this)"
                        class="h-full w-full object-cover transform transition-all duration-300 cursor-zoom-in origin-center relative">
                </div>
                <h3 id="modal-mentor-name" class="text-xl font-bold text-slate-100"></h3>
                <span id="modal-mentor-badge"
                    class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs font-semibold px-3 py-1 rounded-full"></span>
            </div>

            <div class="border-t border-slate-800 pt-4">
                <p class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2">Biodata & Sanad</p>
                <div id="modal-mentor-bio" class="text-slate-300 text-sm leading-relaxed space-y-2 prose prose-invert">
                </div>
            </div>
        </div>
    </div>
</div>
