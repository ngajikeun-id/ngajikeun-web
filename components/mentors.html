<section id="mentor-section" class="py-16 bg-slate-950 scroll-mt-24">
    <div class="max-w-6xl mx-auto px-4">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-gray-100">Mengenal Mentor Kami</h2>
            <p class="text-lg italic text-slate-300">"Dibimbing langsung oleh mentor bersanad hingga tingkatan ke-29
                dari Rasulullah SAW"</p>
        </div>

        <div id="mentor-container" class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-10 text-gray-400 italic">
                Memuat profil asatidzah...
            </div>
        </div>
    </div>
</section>

<div id="mentor-modal"
    class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-2 md:p-4">
    <div
        class="bg-slate-900 border border-slate-800 rounded-2xl max-w-4xl w-full max-h-[calc(100vh-2rem)] md:max-h-[calc(100vh-4rem)] overflow-y-auto custom-scroll shadow-2xl transform transition-all flex flex-col">

        <div
            class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-20 bg-gradient-to-r from-emerald-500/10 to-transparent">
            <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider flex items-center gap-2">
                <span class="inline-block h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Profil Musyrifah - Zoom Inspeksi Aktif
            </h3>
            <button onclick="window.closeMentorModal()"
                class="text-slate-400 hover:text-emerald-400 p-1 hover:bg-slate-800 rounded-lg transition-all"
                type="button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

            <div
                class="flex flex-col items-center text-center space-y-4 border-b md:border-b-0 md:border-r border-slate-800 pb-6 md:pb-0 md:pr-6">
                <div class="relative flex-shrink-0">
                    <img id="modal-mentor-img" src="" alt=""
                        class="h-40 w-40 rounded-full object-cover ring-4 ring-emerald-500/30 shadow-xl">
                    <div
                        class="absolute bottom-2 right-2 bg-slate-950/80 p-1.5 rounded-full border border-slate-700 text-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7" />
                        </svg>
                    </div>
                </div>
                <div>
                    <h4 id="modal-mentor-name" class="text-xl font-bold text-slate-100"></h4>
                    <span id="modal-mentor-badge"
                        class="inline-block mt-1 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs font-semibold px-3 py-1 rounded-full"></span>
                </div>
                <div class="w-full text-left pt-2">
                    <p class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2">Detail Silsilah Sanad
                    </p>
                    <div id="modal-mentor-bio"
                        class="text-slate-300 text-sm leading-relaxed space-y-2 prose prose-invert"></div>
                </div>
            </div>

            <div class="flex flex-col justify-between space-y-4">
                <div class="flex flex-col space-y-2">
                    <span class="text-xs font-semibold text-slate-400">Arahkan kursor / gunakan slider untuk inspeksi
                        detail dokumen:</span>

                    <div id="zoom-viewport"
                        class="relative w-full h-64 bg-slate-950 rounded-xl border border-slate-800 overflow-hidden cursor-move group flex-shrink-0">
                        <img id="modal-mentor-zoom-img" src="" alt=""
                            class="absolute w-full h-full object-cover origin-center transition-transform duration-75 ease-out select-none">

                        <div
                            class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30 group-hover:opacity-70 transition-opacity">
                            <div class="w-6 h-6 border border-emerald-500 rounded-full relative">
                                <div class="absolute top-1/2 left-0 w-6 h-[1px] bg-emerald-500 -translate-y-1/2"></div>
                                <div class="absolute left-1/2 top-0 w-[1px] h-6 bg-emerald-500 -translate-x-1/2"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-950 border border-slate-800 rounded-xl p-4 space-y-3 flex-shrink-0">
                    <div class="flex justify-between items-center text-xs font-bold">
                        <span class="text-slate-400">Zoom Level: <span id="zoom-label"
                                class="text-emerald-400">100%</span></span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-slate-500 text-xs font-bold">-</span>
                        <input id="zoom-slider" type="range" min="100" max="400" value="100"
                            class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500 focus:outline-none">
                        <span class="text-slate-500 text-xs font-bold">+</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-950 flex justify-end sticky bottom-0 z-20">
            <button onclick="window.closeMentorModal()"
                class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold px-5 py-2 rounded-xl transition-all"
                type="button">Tutup</button>
        </div>
    </div>
</div>
