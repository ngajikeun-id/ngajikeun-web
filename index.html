<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Bimbingan Khusus Praktik Membaca Al-Qur'an Privat Sesuai Makhraj & Tajwid Bersanad.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ngajikeun.ciwai.dev/">
    <meta property="og:title" content="Ngajikeun.id - Bimbingan Al-Qur'an Bersanad">
    <meta property="og:description" content="Belajar Al-Qur'an privat, jadwal fleksibel, dibimbing pengajar bersanad.">
    <meta property="og:image" content="https://ngajikeun.ciwai.dev/public/img/og-image.jpg">

    <title>Ngajikeun.id - Bimbingan Al-Qur'an Bersanad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

    <style>
        /* Dasar & Perilaku Scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Efek Hover Gambar Umum */
        .group:hover img {
            transform: scale(1.05);
        }

        /* Animasi Entry untuk Container Data */
        #program-container>div,
        #mentor-container>div,
        #testimonial-container>div {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Utilitas Reveal on Scroll */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- CUSTOM SCROLLBAR (Minimalis & Ringan) --- */
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(16, 185, 129, 0.3) transparent;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.3);
            /* Emerald halus */
            border-radius: 10px;
        }

        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.6);
        }

        /* --- ABOUT SECTION STYLING (Markdown & Grid) --- */
        .about-story p {
            color: #475569;
            font-size: 0.94rem;
            line-height: 1.85;
            margin-bottom: 1.2rem;
        }

        .about-story p:first-of-type {
            color: #334155;
            font-size: 1rem;
            font-weight: 500;
        }

        .about-story p:last-child {
            margin-bottom: 0;
        }

        /* Kursor khusus untuk Fancybox */
        .cursor-zoom-in {
            cursor: zoom-in;
        }

        /* Fix Layout Grid agar tidak ada sisa flex lama */
        #about-slides {
            display: grid !important;
        }
    </style>

    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans">

    <div data-component="navbar" data-component-src="components/navbar.html">
        <div class="px-6 py-4 text-sm text-slate-400">Memuat navigasi...</div>
    </div>

    <div data-component="hero" data-component-src="components/hero.html">
        <div class="bg-emerald-700 text-white py-16 px-6 text-center">
            <p class="text-sm uppercase tracking-[0.2em] text-emerald-200">Memuat halaman...</p>
        </div>
    </div>

    <div data-component="about" data-component-src="components/about.html"></div>
    <div data-component="programs" data-component-src="components/programs.html"></div>
    <div data-component="mentors" data-component-src="components/mentors.html"></div>
    <div data-component="testimonials" data-component-src="components/testimonials.html"></div>
    <div data-component="articles" data-component-src="components/articles.html"></div>
    <div data-component="products" data-component-src="components/products.html"></div>
    <div data-component="quiz" data-component-src="components/quiz.html"></div>

    <div data-component="footer" data-component-src="components/footer.html"></div>
    <div data-component="floating-actions" data-component-src="components/floating-actions.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/api-sync.js"></script>
    <script src="assets/js/component-loader.js"></script>
    <script src="assets/js/main.js"></script>

    <!-- Article Modal Container -->
    <div id="article-modal" class="fixed inset-0 z-[100] hidden overflow-y-auto px-4 py-6 transition-all duration-300">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeArticleModal()">
        </div>

        <div
            class="relative mx-auto max-w-4xl rounded-[2rem] bg-white shadow-2xl transition-all animate-in fade-in zoom-in duration-300">
            <div
                class="sticky top-0 z-20 flex items-center justify-between border-b border-emerald-50 bg-white/90 p-6 backdrop-blur-md rounded-t-[2rem]">
                <h2 id="modal-title"
                    class="text-lg md:text-xl font-bold text-emerald-800 uppercase tracking-widest px-2">
                    Detail Artikel
                </h2>
                <button onclick="closeArticleModal()"
                    class="rounded-full p-2 text-slate-400 hover:bg-emerald-50 hover:text-emerald-600 transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-8 md:p-12">
                <article id="modal-body" class="prose prose-emerald lg:prose-xl max-w-none 
                       prose-headings:text-emerald-900 prose-headings:font-bold 
                       prose-p:text-slate-700 prose-p:leading-relaxed 
                       prose-strong:text-emerald-700 prose-img:rounded-2xl">
                </article>
            </div>

            <div class="p-6 border-t border-slate-50 text-center">
                <button onclick="closeArticleModal()"
                    class="text-sm font-bold text-slate-400 hover:text-emerald-600 transition-colors">
                    Tutup Bacaan
                </button>
            </div>
        </div>
    </div>
</body>

</html>
