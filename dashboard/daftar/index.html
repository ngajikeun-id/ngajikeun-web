<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pendaftaran Program | Ngajikeun.id</title>

    <link rel="stylesheet" href="/assets/css/style.css">

    <style>
        body {
            background: #f8fafc;
            font-family: system-ui, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .05);
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        textarea {
            min-height: 120px;
        }

        button {
            background: #0f766e;
            color: #fff;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #115e59;
        }

        .hidden {
            display: none;
        }

        .success {
            padding: 15px;
            background: #dcfce7;
            color: #166534;
            border-radius: 12px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Pendaftaran Program</h1>
            <p class="subtitle">
                Lengkapi formulir berikut untuk mendaftar program pilihan Anda.
            </p>

            <form id="registrationForm">

                <div class="form-group">
                    <label>Program</label>
                    <input id="programTitle" readonly>
                </div>

                <div class="form-group">
                    <label>Batch</label>
                    <select id="batchSelect" required>
                        <option value="">Memuat batch...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input id="fullName" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input id="email" type="email" required>
                </div>

                <div class="form-group">
                    <label>WhatsApp</label>
                    <input id="phone">
                </div>

                <div class="form-group">
                    <label>Usia</label>
                    <input id="age" type="number">
                </div>

                <div class="form-group">
                    <label>Domisili</label>
                    <input id="domicile">
                </div>

                <div class="form-group">
                    <label>Profesi</label>
                    <input id="profession">
                </div>

                <div class="form-group">
                    <label>Pernah Mengikuti Program Ngajikeun?</label>

                    <select id="returningStudent">
                        <option value="false">Belum</option>
                        <option value="true">Sudah</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Memiliki Hafalan?</label>

                    <select id="hasHafalan">
                        <option value="false">Belum</option>
                        <option value="true">Ya</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jumlah Juz Yang Sudah Dihafal</label>
                    <input id="hafalanJuz" type="number">
                </div>

                <div class="form-group">
                    <label>Target Setoran Juz</label>
                    <input id="targetJuz">
                </div>

                <div class="form-group">
                    <label>Tahu Program Dari Mana?</label>
                    <input id="sourceInfo">
                </div>

                <div class="form-group">
                    <label>Motivasi Mengikuti Program</label>
                    <textarea id="motivation"></textarea>
                </div>

                <button type="submit">
                    Kirim Pendaftaran
                </button>

            </form>

            <div id="successBox" class="success hidden">
                Alhamdulillah 🎉 Pendaftaran berhasil dikirim.
            </div>

        </div>

    </div>

    <script type="module" src="./register.js"></script>

</body>

</html>
