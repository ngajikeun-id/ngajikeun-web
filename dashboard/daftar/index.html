<form id="registrationForm">

    <select id="program">
        <option value="">Pilih Program</option>
    </select>

    <select id="batch">
        <option value="">Pilih Batch</option>
    </select>

    <input type="text" id="full_name" placeholder="Nama Lengkap">

    <input type="email" id="email" placeholder="Email">

    <input type="text" id="phone" placeholder="Nomor WhatsApp">

    <input type="number" id="age" placeholder="Usia">

    <input type="text" id="domicile" placeholder="Domisili">

    <input type="text" id="profession" placeholder="Profesi">

    <select id="has_hafalan">
        <option value="false">Belum Memiliki Hafalan</option>
        <option value="true">Sudah Memiliki Hafalan</option>
    </select>

    <input type="number" id="hafalan_juz">

    <input type="text" id="target_juz">

    <textarea id="source_info"></textarea>

    <textarea id="motivation"></textarea>

    <button type="submit">
        Kirim Pendaftaran
    </button>

</form>
