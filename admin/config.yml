show_preview_links: true
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

brand_name: "CiwAI™ Smart Digital"
logo_url: /images/logo/logo_ciwai.png
display_url: "https://ngajikeun.ciwai.dev"

backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "public/images/uploads"

collections:
  - name: "quizzes"
    label: "Koleksi Kuis"
    folder: "content/quizzes"
    extension: "json"
    format: "json"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul Kuis", name: "title", widget: "string"}
      - {label: "Deskripsi Singkat", name: "description", widget: "text"}
      - {label: "Link Quizlet", name: "link", widget: "string"}
      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - { label: "Tahfidz", value: "tahfidz" }
          - { label: "Tajwid", value: "tajwid" }

  - name: "programs"
    label: "Program Belajar"
    folder: "content/programs"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{title}}"
    fields:
      - {label: "Judul Program", name: "title", widget: "string"}
      - {label: "Deskripsi Singkat", name: "description", widget: "text"}
      - {label: "Harga/Infaq", name: "price", widget: "string", default: "Gratis"}
      - {label: "Gambar (Optional)", name: "image", widget: "image", required: false}
      - {label: "Link G-Form", name: "registration_link", widget: "string", required: false}

  - name: "mentors"
    label: "Tim Mentor"
    folder: "content/mentors"
    create: true
    extension: "json"
    format: "json"
    slug: "{{name}}"
    fields:
      - {label: "Nama Lengkap", name: "name", widget: "string"}
      - {label: "Gelar/Spesialisasi", name: "specialty", widget: "string"}
      - {label: "Sanad & Pengalaman", name: "bio", widget: "text"}
      - {label: "Foto Profil", name: "image", widget: "image"}
    
  - name: "testimonials"
    label: "Testimoni Santri"
    folder: "content/testimonials"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{name}}"
    fields:
      - {label: "Nama Santri", name: "name", widget: "string"}
      - {label: "Pekerjaan/Status", name: "status", widget: "string"}
      - {label: "Isi Testimoni", name: "content", widget: "text"}
      - {label: "Foto (Optional)", name: "image", widget: "image", required: false}

  - name: "articles"
    label: "Artikel & Literasi"
    folder: "content/articles"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul Artikel", name: "title", widget: "string"}
      - {label: "Tanggal Publish", name: "date", widget: "datetime"}
      - {label: "Thumbnail Artikel", name: "thumbnail", widget: "image", required: false}
      - {label: "Deskripsi Singkat", name: "description", widget: "text", hint: "Muncul di halaman depan (limit 100 karakter)"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "products"
    label: "Produk & E-Book"
    folder: "content/products"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Link Checkout/WA", name: "link", widget: "string", default: "https://wa.me/6281932692047"}
      - {label: "Image Cover", name: "image", widget: "image", required: false}
      
  - name: "about"
    label: "Tentang Kami (Detail)"
    files:
      - file: "content/about.json"
        label: "Informasi Detail"
        name: "about_details"
        fields:
          - {label: "Sejarah", name: "history", widget: "markdown"}
          - {label: "Visi", name: "vision", widget: "text"}
          - {label: "Misi", name: "missions", widget: "list", field: {label: "Poin Misi", name: "item", widget: "string"}}
          - {label: "Gallery Slides", name: "slides", widget: "list", fields: [{label: "Image", name: "image", widget: "image"}]}