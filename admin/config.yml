show_preview_links: true
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

brand_name: "Ngajikeun.id"
logo_url: /images/logo/logo-ngk.png
display_url: "https://ngajikeun.id"

backend:
  name: git-gateway
  branch: main

links:
  - { label: "📈 Statistik Pengunjung", url: "https://cloud.umami.is/share/wwTd9VfrO2Xe8A77", target: "_blank" }

media_folder: "public/images/uploads"
public_folder: "/public/images/uploads"

collections:
  - name: "dashboard"
    label: "🏠 Dashboard & Statistik"
    files:
      - file: "content/dashboard.json"
        label: "Welcome & Link Statistik"
        name: "main_dashboard"
        fields:
          - {label: "Mode Perawatan (Maintenance)", name: "is_maintenance", widget: "boolean", default: false, hint: "Aktifkan jika website ingin dialihkan ke halaman maintenance"}
          - {label: "Pesan Selamat Datang", name: "welcome_msg", widget: "string", default: "Selamat Datang Admin Ngajikeun.id"}
          - {label: "Link Statistik (Umami)", name: "stats_link", widget: "string", default: "https://cloud.umami.is/share/wwTd9VfrO2Xe8A77", hint: "Klik link ini untuk pantau pengunjung"}
          - {label: "Pusat Bantuan", name: "help", widget: "markdown", default: "Hubungi [CiwAI™ Support](https://wa.me/6285121380541)"}

  # --- 1. PROFIL (About) ---
  - name: "about"
    label: "🏢 Tentang Kami"
    files:
      - file: "content/about.json"
        label: "Informasi Detail"
        name: "about_details"
        fields:
          - {label: "Sejarah", name: "history", widget: "markdown"}
          - {label: "Visi", name: "vision", widget: "text"}
          - {label: "Misi", name: "missions", widget: "list", field: {label: "Item", name: "item", widget: "string"}}

  # --- 2. PROGRAM BELAJAR ---
  - name: "programs"
    label: "📖 Program Belajar"
    folder: "content/programs"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Deskripsi", name: "description", widget: "text"}
      - {label: "Link Pendaftaran (WA/Form)", name: "registration_link", widget: "string"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Detail / Overview Program", name: "body", widget: "markdown", required: false}

  # --- 3. TIM MENTOR ---
  - name: "mentors"
    label: "🎓 Tim Mentor"
    folder: "content/mentors"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Nama", name: "name", widget: "string"}
      - {label: "Spesialisasi", name: "specialty", widget: "string"}
      - {label: "Foto", name: "image", widget: "image"}

  # --- 4. TESTIMONI ---
  - name: "testimonials"
    label: "💬 Testimoni"
    folder: "content/testimonials"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Nama", name: "name", widget: "string"}
      - {label: "Isi", name: "content", widget: "text"}

  # --- 5. LITERASI ---
  - name: "articles"
    label: "📰 Artikel"
    folder: "content/articles"
    create: true
    extension: "md"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  # --- 6. PRODUK ---
  - name: "products"
    label: "🛍️ Produk & E-Book"
    folder: "content/products"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Link", name: "link", widget: "string"}
      - {label: "Image", name: "image", widget: "image", required: false}

  # --- 7. EVALUASI ---
  - name: "quizzes"
    label: "✍️ Koleksi Kuis"
    folder: "content/quizzes"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Link", name: "link", widget: "string"}
