<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Ngajikeun.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==================================================
   MIDNIGHT EMERALD PREMIUM THEME
   ================================================== */

        :root {
            --bg: #0f172a;
            --sidebar: #111827;
            --panel: #1e293b;
            --border: #334155;

            --accent: #10b981;
            --accent-hover: #34d399;

            --text: #f8fafc;
            --muted: #94a3b8;
        }

        /* ==================================================
   APP LAYOUT
   ================================================== */

        body {
            background: var(--bg) !important;
            color: var(--text) !important;
        }

        .nc-app-container,
        [class*="AppContainer"],
        [class*="AppLayout"],
        [class*="EditorContainer"],
        [class*="EditorLayout"],
        [class*="EditorPane"] {
            background: var(--bg) !important;
            color: var(--text) !important;
        }

        /* ==================================================
   HEADER
   ================================================== */

        header,
        [class*="AppHeader"] {
            background: #111827 !important;
            border-bottom: 1px solid var(--border) !important;
            backdrop-filter: blur(12px);
        }

        header *,
        [class*="AppHeader"] * {
            color: white !important;
        }

        /* ==================================================
   SIDEBAR
   ================================================== */

        aside,
        [class*="SidebarContainer"],
        [class*="Sidebar"] {
            background: var(--sidebar) !important;
            border-right: 1px solid var(--border) !important;
        }

        [class*="SidebarLink"] {
            color: #cbd5e1 !important;
            font-weight: 500 !important;
            transition: .2s;
        }

        [class*="SidebarLink"]:hover {
            color: white !important;
        }

        [class*="SidebarLinkActive"] {
            background: rgba(16, 185, 129, .15) !important;
            color: white !important;
            border-left: 3px solid var(--accent) !important;
            font-weight: 700 !important;
        }

        /* ==================================================
   CONTROL PANEL
   ================================================== */

        [class*="ControlContainer"] {
            background: var(--panel) !important;

            border: 1px solid var(--border) !important;

            border-radius: 20px !important;

            padding: 1.5rem !important;

            margin-bottom: 1.5rem !important;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .25);

            transition: .25s ease;
        }

        [class*="ControlContainer"]:hover {
            transform: translateY(-2px);
            border-color: var(--accent) !important;
        }

        /* ==================================================
   LABEL
   ================================================== */

        [class*="ControlContainer"] label,
        [class*="ControlContainer"] label span,
        [class*="ControlContainer"] [class*="Label"],
        [class*="ControlPane"] label {

            color: #cbd5e1 !important;

            background: transparent !important;

            border: none !important;

            text-transform: none !important;

            letter-spacing: 0 !important;

            font-size: .9rem !important;

            font-weight: 600 !important;

            margin-bottom: .5rem !important;
        }

        /* ==================================================
   INPUT
   ================================================== */

        input,
        select,
        textarea {

            background: #0b1220 !important;

            color: white !important;

            border: 1px solid var(--border) !important;

            border-radius: 12px !important;

            padding: .8rem !important;

            transition: .2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {

            outline: none !important;

            border-color: var(--accent) !important;

            box-shadow:
                0 0 0 4px rgba(16, 185, 129, .15) !important;
        }

        /* ==================================================
   MARKDOWN EDITOR
   ================================================== */

        div[role="textbox"],
        .w-md-editor,
        .w-md-editor-text,
        [class*="EditorControlPane"] div[role="textbox"],
        [class*="ControlPane"] div[role="textbox"] {

            background: #0b1220 !important;

            border: 1px solid var(--border) !important;

            border-radius: 12px !important;
        }

        div[role="textbox"] *,
        .w-md-editor-text * {
            color: white !important;
            background: transparent !important;
        }

        /* ==================================================
   TOOLBAR
   ================================================== */

        [class*="Toolbar"] {
            background: var(--panel) !important;
            border-color: var(--border) !important;
        }

        [class*="Toolbar"] button {
            color: #cbd5e1 !important;
        }

        [class*="Toolbar"] button:hover {
            background: rgba(16, 185, 129, .15) !important;
            color: white !important;
        }

        /* ==================================================
   HINT
   ================================================== */

        [class*="Hint"],
        div[class*="Hint"] {
            color: var(--muted) !important;
            font-size: .8rem !important;
        }

        /* ==================================================
   PREVIEW PANEL
   ================================================== */

        [class*="PreviewPane"],
        div[class*="PreviewPane"] {

            background: #f8fafc !important;

            border-left: 1px solid #e2e8f0 !important;
        }

        /* ==================================================
   FOOTER TOOLBAR
   ================================================== */

        [class*="EditorToolbar"],
        [class*="ToolbarContainer"] {

            background: #111827 !important;

            border-top: 1px solid var(--border) !important;
        }

        /* ==================================================
   BUTTON
   ================================================== */

        [class*="PublishButton"],
        [class*="SaveButton"] {

            background: linear-gradient(135deg,
                    #10b981,
                    #34d399) !important;

            color: white !important;

            border: none !important;

            border-radius: 12px !important;

            font-weight: 700 !important;

            box-shadow:
                0 10px 25px rgba(16, 185, 129, .25);
        }

        [class*="PublishButton"]:hover,
        [class*="SaveButton"]:hover {

            transform: translateY(-1px);

            filter: brightness(1.05);
        }
    </style>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

    <script>
        window.onload = () => {
            CMS.registerPreviewTemplate("main_dashboard", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const welcomeMsg = entry.getIn(['data', 'welcome_msg']) || 'Selamat Datang Admin';
                    const rawLink = entry.getIn(['data', 'stats_link']) || '';
                    const cleanLink = rawLink.replace('/analytics/us', '');

                    return h('div', { style: { padding: '20px', background: '#f1f5f9', minHeight: '100vh', fontFamily: 'sans-serif' } },
                        h('div', { style: { background: '#059669', padding: '30px', borderRadius: '24px', color: 'white', marginBottom: '20px', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' } },
                            h('h1', { style: { margin: '0', fontSize: '26px', fontWeight: '900' } }, welcomeMsg),
                            h('p', { style: { opacity: '0.8', fontSize: '14px' } }, 'Ngajikeun.id Realtime Monitor Dashboard Statistik')
                        ),
                        h('div', { style: { position: 'relative', background: 'white', padding: '10px', borderRadius: '24px', border: '1px solid #e2e8f0', minHeight: '600px', overflow: 'hidden', marginBottom: '20px' } },
                            h('a', {
                                href: cleanLink,
                                target: '_blank',
                                style: {
                                    position: 'absolute', top: '20px', right: '20px', zIndex: '10',
                                    background: '#0f172a', color: 'white', padding: '10px 20px',
                                    borderRadius: '12px', textDecoration: 'none', fontSize: '12px', fontWeight: 'bold'
                                }
                            }, 'Buka Full Screen ↗'),
                            h('iframe', {
                                src: cleanLink,
                                style: { width: '100%', height: '600px', border: 'none', borderRadius: '15px' },
                                sandbox: 'allow-scripts allow-same-origin allow-forms allow-popups'
                            })
                        ),
                        h('div', { style: { background: '#ffffff', padding: '30px', borderRadius: '24px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.05)', marginBottom: '20px' } },
                            h('div', { style: { display: 'flex', alignItems: 'center', marginBottom: '15px' } },
                                h('span', { style: { fontSize: '24px', marginRight: '10px' } }, '🛡️'),
                                h('h3', { style: { color: '#0f172a', margin: '0', fontSize: '18px', fontWeight: '900', letterSpacing: '-0.5px' } }, 'PUSAT BANTUAN NGAJIKEUN.ID')
                            ),
                            h('p', { style: { color: '#64748b', fontSize: '14px', marginBottom: '20px' } }, 'Untuk bantuan teknis, kustomisasi atau kendala, Tim support kami siap membantu.'),
                            h('a', {
                                href: 'https://wa.me/6285121380541',
                                target: '_blank',
                                style: { display: 'inline-flex', alignItems: 'center', background: '#25D366', color: 'white', padding: '12px 24px', borderRadius: '14px', textDecoration: 'none', fontWeight: 'bold', fontSize: '14px' }
                            }, 'Chat via WhatsApp ↗')
                        ),
                        h('p', { style: { textAlign: 'center', color: '#94a3b8', fontSize: '11px', marginTop: '20px' } },
                            'Note: Jika dashboard kosong, klik tombol Buka Full Screen. Umami Cloud membatasi akses iframe di beberapa browser.')
                    );
                }
            }));

            CMS.registerPreviewTemplate("quizzes", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const title = entry.getIn(['data', 'title']) || 'Judul Kuis';
                    const cat = (entry.getIn(['data', 'category']) || 'tahfidz').toLowerCase();
                    const borderLeftColor = cat === 'tahfidz' ? '#34d399' : '#3b82f6';

                    return h('div', { style: { padding: '32px', background: '#f8fafc', minHeight: '100vh', fontFamily: 'sans-serif' } },
                        h('div', { style: { background: 'white', padding: '24px', borderRadius: '16px', borderLeft: `4px solid ${borderLeftColor}`, boxShadow: '0 1px 3px 0 rgba(0, 0, 0, 0.1)', maxWidth: '448px', margin: '0 auto' } },
                            h('h3', { style: { fontWeight: 'bold', color: '#1e293b', fontSize: '18px', margin: '0 0 4px 0' } }, title),
                            h('button', { style: { marginTop: '16px', backgroundColor: '#1e293b', color: 'white', fontSize: '10px', padding: '8px 16px', borderRadius: '8px', fontWeight: '900', width: '100%', border: 'none', cursor: 'pointer' } }, 'MULAI QUIZ ⚡')
                        )
                    );
                }
            }));
        };
    </script>
</body>

</html>
