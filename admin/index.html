<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Ngajikeun.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --------------------------------------------------
           1. ARSITEKTUR UTAMA & BACKGROUND (EMERALD DARK)
           -------------------------------------------------- */
        body {
            background-color: #022c22 !important;
            color: #f8fafc !important;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
        }

        .nc-app-container,
        [class*="AppContainer"],
        [class*="AppLayout"],
        [class*="EditorContainer"],
        [class*="EditorLayout"],
        [class*="EditorPane"] {
            background-color: #022c22 !important;
            color: #f8fafc !important;
        }

        /* Topbar & Sidebar */
        header,
        [class*="AppHeader"] {
            background-color: #064e3b !important;
            border-bottom: 2px solid #10b981 !important;
        }

        [class*="AppHeader"] button,
        [class*="AppHeader"] a,
        [class*="AppHeader"] span {
            color: #ffffff !important;
            font-weight: bold !important;
        }

        aside,
        [class*="SidebarContainer"],
        [class*="Sidebar"] {
            background-color: #043e2f !important;
            border-right: 2px solid #064e3b !important;
        }

        [class*="SidebarLink"] {
            color: #a7f3d0 !important;
            font-weight: 600 !important;
        }

        [class*="SidebarLinkActive"] {
            color: #ffffff !important;
            background-color: #022c22 !important;
            border-left: 4px solid #10b981 !important;
        }

        /* --------------------------------------------------
           2. SISI KIRI: INPUT FORM (WAJIB PUTIH MERDEKA)
           -------------------------------------------------- */
        [class*="ControlContainer"] {
            background-color: #064e3b !important;
            border: 2px solid #0f766e !important;
            border-radius: 1.25rem !important;
            padding: 1.5rem !important;
        }

        [class*="ControlContainer"] label[class*="ControlLabel"] {
            color: #34d399 !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.05em !important;
            background: transparent !important;
            padding: 0 !important;
        }

        input,
        textarea,
        select,
        div[role="textbox"],
        [class*="ControlPane"],
        [id^="nc-root"] input,
        [id^="nc-root"] textarea {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border: 2px solid #cbd5e1 !important;
            border-radius: 0.75rem !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
        }

        div[role="textbox"] *,
        [class*="ControlPane"] * {
            color: #0f172a !important;
        }

        /* Markdown Toolbar */
        [class*="Toolbar"] {
            background-color: #f1f5f9 !important;
            border-bottom: 2px solid #cbd5e1 !important;
        }

        [class*="Toolbar"] button {
            color: #334155 !important;
        }

        /* --------------------------------------------------
           3. SISI KANAN: PREVIEW PANEL (FIX UNTUK BLANK/REDEP)
           -------------------------------------------------- */
        [class*="PreviewPane"] {
            background-color: #0f172a !important;
            border-left: 2px solid #1e293b !important;
        }

        [class*="PreviewPane"] h1,
        [class*="PreviewPane"] h2,
        [class*="PreviewPane"] h3,
        [class*="PreviewPane"] h4,
        [class*="PreviewPane"] h5,
        [class*="PreviewPane"] h6 {
            color: #ffffff !important;
            font-weight: 900 !important;
        }

        [class*="PreviewPane"] p,
        [class*="PreviewPane"] span,
        [class*="PreviewPane"] div,
        [class*="PreviewPane"] time {
            color: #e2e8f0 !important;
        }

        [class*="PreviewPane"] a,
        [class*="PreviewPane"] button {
            color: #ffffff !important;
            opacity: 1 !important;
        }

        /* --------------------------------------------------
           4. TOMBOL SAVE & PUBLISH DI BAWAH DASHBOARD
           -------------------------------------------------- */
        [class*="EditorToolbar"],
        [class*="ToolbarContainer"] {
            background-color: #064e3b !important;
            border-top: 2px solid #10b981 !important;
        }

        [class*="PublishButton"],
        [class*="SaveButton"],
        button[class*="Button-Grid-StyledButton"] {
            background-color: #10b981 !important;
            color: #ffffff !important;
            font-weight: bold !important;
            border-radius: 0.75rem !important;
        }
    </style>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

    <script>
        CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css");
        CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap");

        window.onload = () => {
            // ----------------------------------------
            // 0. TEMPLATE PREVIEW: DASHBOARD UTAMA
            // ----------------------------------------
            CMS.registerPreviewTemplate("main_dashboard", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const welcomeMsg = entry.getIn(['data', 'welcome_msg']) || 'Selamat Datang Admin';
                    const rawLink = entry.getIn(['data', 'stats_link']) || '';
                    const cleanLink = rawLink.replace('/analytics/us', '');

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 font-sans' },
                        h('div', { className: 'relative max-w-4xl mx-auto space-y-8' },
                            // Welcome Banner
                            h('div', { className: 'relative overflow-hidden bg-emerald-950/40 border border-emerald-500/20 p-8 rounded-[2rem] shadow-xl shadow-emerald-950/30' },
                                h('div', { className: 'absolute -top-12 -left-12 w-48 h-48 bg-emerald-500/10 rounded-full blur-2xl' }),
                                h('h1', { className: 'relative z-10 text-3xl font-black text-slate-100 mb-2' }, welcomeMsg),
                                h('p', { className: 'relative z-10 text-emerald-400 text-xs font-bold uppercase tracking-wider' }, 'Ngajikeun.id Realtime Monitor Dashboard Statistik')
                            ),

                            // Analytics IFrame
                            h('div', { className: 'relative bg-slate-900 border border-slate-800 p-3 rounded-[2.5rem] shadow-2xl overflow-hidden' },
                                h('div', { className: 'flex justify-between items-center px-4 py-2 border-b border-slate-800/80 mb-4' },
                                    h('span', { className: 'text-xs font-bold text-slate-400 uppercase tracking-widest' }, 'Statistik Pengunjung (Umami)'),
                                    h('a', {
                                        href: cleanLink,
                                        target: '_blank',
                                        className: 'px-4 py-2 bg-slate-950 border border-slate-800 text-emerald-400 hover:text-emerald-300 hover:bg-slate-800 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all'
                                    }, 'Buka Full Screen ↗')
                                ),
                                h('iframe', {
                                    src: cleanLink,
                                    className: 'w-full h-[500px] border-none rounded-2xl bg-slate-950',
                                    sandbox: 'allow-scripts allow-same-origin allow-forms allow-popups'
                                })
                            ),

                            // Help Box
                            h('div', { className: 'bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-6' },
                                h('div', {},
                                    h('div', { className: 'flex items-center gap-3 mb-2' },
                                        h('span', { className: 'text-xl' }, '🛡️'),
                                        h('h3', { className: 'text-lg font-black text-slate-100 uppercase tracking-tight' }, 'Pusat Bantuan Ngajikeun.id')
                                    ),
                                    h('p', { className: 'text-slate-400 text-xs leading-relaxed max-w-lg' }, 'Untuk bantuan teknis, kustomisasi atau kendala, Tim support kami siap membantu antum.')
                                ),
                                h('a', {
                                    href: 'https://wa.me/6285121380541',
                                    target: '_blank',
                                    className: 'w-full md:w-auto px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-black uppercase tracking-widest rounded-xl text-center shadow-lg shadow-emerald-500/20 transition-all'
                                }, 'Chat WhatsApp ↗')
                            )
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 1. TEMPLATE PREVIEW: TENTANG KAMI
            // ----------------------------------------
            CMS.registerPreviewTemplate("about", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const history = entry.getIn(['data', 'history']) || '';
                    const vision = entry.getIn(['data', 'vision']) || '';
                    const missions = entry.getIn(['data', 'missions']) || [];

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 font-sans' },
                        h('section', { className: 'max-w-4xl mx-auto space-y-12' },
                            h('div', { className: 'text-center' },
                                h('span', { className: 'inline-block bg-emerald-500/10 text-emerald-300 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] mb-4 border border-emerald-500/20' }, 'Tentang Kami'),
                                h('h2', { className: 'text-3xl font-black text-slate-100 tracking-tight' }, 'Menghidupkan Al-Qur\'an Sebelum Kematian Menghampiri')
                            ),
                            h('div', { className: 'grid md:grid-cols-2 gap-12' },
                                // Sejarah
                                h('div', { className: 'relative pl-8 border-l-4 border-emerald-500/20' },
                                    h('span', { className: 'absolute -left-[10px] top-0 bg-emerald-500 text-white text-[8px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter' }, 'Latar Belakang'),
                                    h('div', { className: 'pt-8 text-slate-300 text-sm leading-relaxed space-y-4' },
                                        history.split('\n\n').map((p, idx) => h('p', { key: idx }, p))
                                    )
                                ),
                                // Visi & Misi
                                h('div', { className: 'relative pl-8 border-l-4 border-emerald-500/20' },
                                    h('span', { className: 'absolute -left-[10px] top-0 bg-emerald-500 text-white text-[8px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter' }, 'Visi & Misi'),
                                    h('div', { className: 'pt-8 space-y-6' },
                                        h('div', {},
                                            h('p', { className: 'text-xs font-bold text-emerald-400 uppercase tracking-widest mb-2' }, 'Visi'),
                                            h('p', { className: 'text-sm italic text-slate-300 leading-relaxed' }, vision ? `"${vision}"` : "")
                                        ),
                                        h('div', { className: 'space-y-3' },
                                            h('p', { className: 'text-xs font-bold text-emerald-400 uppercase tracking-widest' }, 'Misi'),
                                            h('div', { className: 'space-y-3 text-sm text-slate-300' },
                                                missions.map((misi, idx) => h('p', { key: idx, className: 'relative pl-4' },
                                                    h('span', { className: 'absolute left-0 text-emerald-500' }, '•'),
                                                    misi
                                                ))
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 2. TEMPLATE PREVIEW: PROGRAM BELAJAR
            // ----------------------------------------
            CMS.registerPreviewTemplate("programs", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const title = entry.getIn(['data', 'title']) || 'Nama Program';
                    const description = entry.getIn(['data', 'description']) || 'Deskripsi program...';
                    const registrationLink = entry.getIn(['data', 'registration_link']) || '#';
                    const image = entry.getIn(['data', 'image']) || 'images/logo/logo-ngk.png';
                    const body = entry.getIn(['data', 'body']) || '';

                    const imgUrl = image.startsWith('/') ? image : '/' + image;

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 font-sans' },
                        h('div', { className: 'max-w-xl mx-auto space-y-12' },
                            h('div', { className: 'text-center border-b border-slate-800 pb-4' },
                                h('span', { className: 'inline-block bg-emerald-500/10 text-emerald-300 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] mb-4 border border-emerald-500/20' }, 'PROGRAM BELAJAR'),
                                h('h2', { className: 'text-2xl font-black' }, 'Preview Kartu & Detail')
                            ),

                            // Card View (Front-end style)
                            h('div', { className: 'bg-slate-900 rounded-[2rem] overflow-hidden border border-slate-800 max-w-sm mx-auto shadow-2xl' },
                                h('div', { className: 'relative overflow-hidden aspect-[4/3] bg-slate-800' },
                                    h('img', { src: imgUrl, className: 'w-full h-full object-cover' })
                                ),
                                h('div', { className: 'p-8' },
                                    h('h3', { className: 'text-xl font-bold text-slate-100 leading-tight mb-2' }, title),
                                    h('p', { className: 'text-slate-400 text-xs leading-relaxed mb-6' }, description),
                                    h('button', { className: 'block w-full text-center py-4 bg-slate-950 border border-slate-800 text-slate-100 text-[10px] font-black uppercase tracking-widest rounded-xl' }, 'Detail Program 📖')
                                )
                            ),

                            // Detail View (Modal style)
                            h('div', { className: 'border-t border-slate-800 pt-8 mt-12 text-center' },
                                h('p', { className: 'text-xs text-slate-500 mb-6 font-bold uppercase tracking-widest' }, '--- DETAIL DI DALAM MODAL ---'),
                                imgUrl ? h('img', {
                                    src: imgUrl,
                                    className: 'w-full max-h-[60vh] object-contain rounded-[2rem] mb-8 shadow-lg cursor-zoom-in'
                                }) : null,
                                h('span', { className: 'text-emerald-400 font-bold tracking-widest text-[10px] uppercase block mb-4' }, 'Detail Program Belajar'),
                                h('h2', { className: 'text-3xl font-black text-slate-100 mb-6 leading-tight' }, title),
                                h('div', { className: 'text-left border-t border-slate-800 pt-8 mb-8 text-slate-300 text-sm leading-relaxed space-y-4' },
                                    body.split('\n\n').map((p, idx) => h('p', { key: idx, className: 'text-slate-200 mb-4' }, p))
                                ),
                                h('a', { href: registrationLink, target: '_blank', className: 'inline-block px-8 py-4 bg-emerald-600 border border-emerald-500 text-white text-[11px] font-black uppercase tracking-widest rounded-xl hover:bg-emerald-700 shadow-lg' }, 'Daftar Sekarang Lewat WA ⚡')
                            )
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 3. TEMPLATE PREVIEW: TIM MENTOR
            // ----------------------------------------
            CMS.registerPreviewTemplate("mentors", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const name = entry.getIn(['data', 'name']) || 'Nama Mentor';
                    const specialty = entry.getIn(['data', 'specialty']) || 'Spesialisasi Pengajaran';
                    const image = entry.getIn(['data', 'image']) || 'https://via.placeholder.com/150';

                    const imgUrl = image.startsWith('/') ? image : '/' + image;

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center font-sans' },
                        h('div', { className: 'text-center group max-w-xs' },
                            h('div', { className: 'relative inline-block' },
                                h('img', { src: imgUrl, className: 'w-32 h-32 md:w-40 md:h-40 rounded-full object-cover border-4 border-slate-800 hover:border-emerald-500 transition-all duration-300 shadow-md' })
                            ),
                            h('h3', { className: 'mt-4 text-lg font-bold text-slate-200' }, name),
                            h('p', { className: 'text-emerald-400 text-sm font-medium mb-2' }, specialty)
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 4. TEMPLATE PREVIEW: TESTIMONI
            // ----------------------------------------
            CMS.registerPreviewTemplate("testimonials", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const name = entry.getIn(['data', 'name']) || 'Nama Santri';
                    const content = entry.getIn(['data', 'content']) || 'Tulis ulasan santri di sini...';
                    const status = entry.getIn(['data', 'status']) || 'Santri Ngajikeun.id';
                    const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=047857&color=fff`;

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center font-sans' },
                        h('div', { className: 'bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-800 italic text-slate-300 relative max-w-md shadow-2xl' },
                            h('span', { className: 'text-6xl text-emerald-500/30 absolute top-2 left-2 font-serif' }, '“'),
                            h('p', { className: 'relative z-10 mb-6 text-sm leading-relaxed' }, content),
                            h('div', { className: 'flex items-center gap-4 border-t border-slate-800 pt-4' },
                                h('img', { src: avatar, className: 'w-12 h-12 rounded-full border-2 border-emerald-500' }),
                                h('div', {},
                                    h('h4', { className: 'font-bold text-slate-200 not-italic' }, name),
                                    h('p', { className: 'text-xs text-emerald-400 not-italic' }, status)
                                )
                            )
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 5. TEMPLATE PREVIEW: ARTIKEL LITERASI
            // ----------------------------------------
            CMS.registerPreviewTemplate("articles", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const title = entry.getIn(['data', 'title']) || 'Judul Artikel';
                    const body = entry.getIn(['data', 'body']) || '';
                    const thumbnail = entry.getIn(['data', 'thumbnail']) || '';
                    const date = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });

                    const imgUrl = thumbnail.startsWith('/') ? thumbnail : '/' + thumbnail;

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 font-sans' },
                        h('div', { className: 'max-w-2xl mx-auto space-y-12' },
                            h('div', { className: 'text-center border-b border-slate-800 pb-4' },
                                h('span', { className: 'inline-block bg-emerald-500/10 text-emerald-300 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] mb-4 border border-emerald-500/20' }, 'LITERASI AL-QUR\'AN'),
                                h('h2', { className: 'text-2xl font-black' }, 'Preview Kartu & Halaman Baca')
                            ),

                            // Card View
                            h('div', { className: 'bg-slate-900 rounded-3xl p-1.5 border border-slate-800 max-w-sm mx-auto shadow-xl' },
                                h('div', { className: 'bg-slate-800 aspect-video rounded-[1.35rem] mb-4 overflow-hidden relative flex items-center justify-center' },
                                    thumbnail ? h('img', { src: imgUrl, className: 'w-full h-full object-cover' }) : h('div', { className: 'absolute inset-0 bg-gradient-to-br from-emerald-500/20 to-blue-500/20' })
                                ),
                                h('div', { className: 'p-5 text-center' },
                                    h('time', { className: 'text-[9px] font-bold text-emerald-400 uppercase tracking-widest block mb-2' }, date),
                                    h('h3', { className: 'text-lg font-bold text-slate-100 leading-snug mb-3' }, title),
                                    h('p', { className: 'text-slate-400 text-xs line-clamp-2 mb-5 leading-relaxed' }, body ? body.substring(0, 120) + '...' : 'Tulis konten artikel di sidebar...'),
                                    h('button', { className: 'inline-flex w-full items-center justify-center py-3 px-4 bg-slate-950 border border-slate-800 text-emerald-400 text-[10px] font-black uppercase tracking-widest rounded-xl' }, 'Baca Selengkapnya')
                                )
                            ),

                            // Modal Reader View
                            h('div', { className: 'border-t border-slate-800 pt-8 mt-12 text-center' },
                                h('p', { className: 'text-xs text-slate-500 mb-6 font-bold uppercase tracking-widest' }, '--- DETAIL DI DALAM MODAL BACA ---'),
                                thumbnail ? h('img', {
                                    src: imgUrl,
                                    className: 'w-full max-h-[60vh] object-contain rounded-[2rem] mb-8 shadow-lg'
                                }) : null,
                                h('span', { className: 'text-emerald-400 font-bold tracking-widest text-[10px] uppercase block mb-4' }, 'Literasi Al-Qur\'an'),
                                h('h2', { className: 'text-3xl font-black text-slate-100 mb-6 leading-tight' }, title),
                                h('div', { className: 'text-left border-t border-slate-800 pt-8 text-slate-300 text-sm leading-relaxed space-y-4' },
                                    body.split('\n\n').map((p, idx) => h('p', { key: idx }, p))
                                )
                            )
                        )
                    );
                }
            }));

            // ----------------------------------------
            // 6. TEMPLATE PREVIEW: PRODUK & E-BOOK
            // ----------------------------------------
            CMS.registerPreviewTemplate("products", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const title = entry.getIn(['data', 'title']) || 'Nama E-Book';
                    const description = entry.getIn(['data', 'description']) || 'Deskripsi e-book...';
                    const price = entry.getIn(['data', 'price']) || 'Gratis';
                    const link = entry.getIn(['data', 'link']) || '#';
                    const image = entry.getIn(['data', 'image']) || '';

                    const imgUrl = image.startsWith('/') ? image : '/' + image;

                    return h('div', { className: 'p-8 bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center font-sans' },
                        h('div', { className: 'group bg-slate-900 rounded-[2.5rem] border border-slate-800 shadow-2xl overflow-hidden max-w-3xl w-full p-4 md:p-6 shadow-emerald-950/20' },
                            h('div', { className: 'flex flex-col md:flex-row items-center gap-8' },
                                h('div', { className: 'w-full md:w-48 h-48 bg-slate-800/50 rounded-[2rem] flex-shrink-0 flex items-center justify-center overflow-hidden' },
                                    image ? h('img', { src: imgUrl, className: 'w-full h-full object-cover rounded-[2rem]' }) : h('span', { className: 'text-5xl' }, '📖')
                                ),
                                h('div', { className: 'flex-grow text-center md:text-left' },
                                    h('div', { className: 'flex flex-col md:flex-row md:items-center gap-2 mb-3' },
                                        h('h3', { className: 'text-xl font-black text-slate-100' }, title),
                                        h('span', { className: 'hidden md:block w-1 h-1 rounded-full bg-emerald-500' }),
                                        h('span', { className: 'text-[10px] font-bold text-emerald-400 uppercase tracking-[0.2em]' }, 'E-Book Series')
                                    ),
                                    h('p', { className: 'text-[13px] leading-relaxed text-slate-400 mb-4 max-w-2xl' }, description),
                                    h('div', { className: 'flex items-center justify-center md:justify-start gap-4' },
                                        h('div', { className: 'flex items-center gap-1 text-emerald-500' },
                                            h('svg', { className: 'w-4 h-4', fill: 'currentColor', viewBox: '0 0 20 20' }, h('path', { d: 'M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z' })),
                                            h('span', { className: 'text-[11px] font-bold' }, 'Akses Selamanya')
                                        )
                                    )
                                ),
                                h('div', { className: 'w-full md:w-auto md:min-w-[180px] p-6 bg-slate-800/80 rounded-[2rem] flex flex-col items-center justify-center border border-slate-700' },
                                    h('span', { className: 'text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1' }, 'Investasi'),
                                    h('span', { className: 'text-2xl font-black text-emerald-400 mb-4' }, price),
                                    h('a', { href: link, className: 'w-full bg-emerald-600 text-white text-[11px] px-6 py-3 rounded-xl font-black uppercase tracking-widest text-center shadow-lg transition-all active:scale-95' }, 'Beli Sekarang')
                                )
                            )
                        )
                    );
                }
