<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | CiwAI™ Smart Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nc-app-container {
            background-color: #f8fafc !important;
        }

        [class*="SidebarContainer"] {
            background-color: #ffffff !important;
            border-right: 1px solid #e2e8f0 !important;
        }

        [class*="LoginButton"] {
            background-color: #0f172a !important;
            border-radius: 0.75rem !important;
            font-weight: 800 !important;
        }
    </style>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

    <script>
        window.onload = () => {
            const tailwindCDN = "https://cdn.tailwindcss.com";

            CMS.registerPreviewTemplate("main_dashboard", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const welcomeMsg = entry.getIn(['data', 'welcome_msg']) || 'Selamat Datang Admin';
                    const rawLink = entry.getIn(['data', 'stats_link']) || '';
                    const cleanLink = rawLink.replace('/analytics/us', '');

                    return h('div', { style: { padding: '20px', background: '#f1f5f9', minHeight: '100vh', fontFamily: 'sans-serif' } },

                        h('div', { style: { background: '#059669', padding: '30px', borderRadius: '24px', color: 'white', marginBottom: '20px', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' } },
                            h('h1', { style: { margin: '0', fontSize: '26px', fontWeight: '900' } }, welcomeMsg),
                            h('p', { style: { opacity: '0.8', fontSize: '14px' } }, 'CiwAI™ Realtime Monitor Dashboard Statistik')
                        ),

                        h('div', { style: { position: 'relative', background: 'white', padding: '10px', borderRadius: '24px', border: '1px solid #e2e8f0', minHeight: '600px', overflow: 'hidden', marginBottom: '20px' } },
                            h('a', {
                                href: cleanLink,
                                target: '_blank',
                                style: {
                                    position: 'absolute', top: '20px', right: '20px', zIndex: '10',
                                    background: '#0f172a', color: 'white', padding: '10px 20px',
                                    borderRadius: '12px', textDecoration: 'none', fontSize: '12px', fontWeight: 'bold'
                                }
                            }, 'Buka Full Screen ↗'),

                            h('iframe', {
                                src: cleanLink,
                                style: { width: '100%', height: '600px', border: 'none', borderRadius: '15px' },
                                sandbox: 'allow-scripts allow-same-origin allow-forms allow-popups'
                            })
                        ),

                        h('div', { style: { background: '#ffffff', padding: '30px', borderRadius: '24px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.05)', marginBottom: '20px' } },
                            h('div', { style: { display: 'flex', alignItems: 'center', marginBottom: '15px' } },
                                h('span', { style: { fontSize: '24px', marginRight: '10px' } }, '🛡️'),
                                h('h3', { style: { color: '#0f172a', margin: '0', fontSize: '18px', fontWeight: '900', letterSpacing: '-0.5px' } }, 'PUSAT BANTUAN CIWAI™')
                            ),
                            h('p', { style: { color: '#64748b', fontSize: '14px', marginBottom: '20px' } }, 'Untuk bantuan teknis, kustomisasi atau kendala, Tim support kami siap membantu.'),

                            h('a', {
                                href: 'https://wa.me/6285121380541',
                                target: '_blank',
                                style: {
                                    display: 'inline-flex',
                                    alignItems: 'center',
                                    background: '#25D366',
                                    color: 'white',
                                    padding: '12px 24px',
                                    borderRadius: '14px',
                                    textDecoration: 'none',
                                    fontWeight: 'bold',
                                    fontSize: '14px'
                                }
                            }, 'Chat via WhatsApp ↗')
                        ),

                        h('p', { style: { textAlign: 'center', color: '#94a3b8', fontSize: '11px', marginTop: '20px' } },
                            'Note: Jika dashboard kosong, klik tombol Buka Full Screen. Umami Cloud membatasi akses iframe di beberapa browser.')
                    );
                }
            }));

            CMS.registerPreviewTemplate("quizzes", createClass({
                render: function () {
                    const entry = this.props.entry;
                    const title = entry.getIn(['data', 'title']) || 'Judul Kuis';
                    const cat = (entry.getIn(['data', 'category']) || 'tahfidz').toLowerCase();
                    const colorClass = cat === 'tahfidz' ? 'border-emerald-400' : 'border-blue-400';

                    return h('div', { className: 'p-8 bg-slate-50 min-h-screen' },
                        h('script', { src: tailwindCDN }),
                        h('div', { className: `bg-white p-6 rounded-2xl border-l-4 ${colorClass} shadow-sm max-w-md mx-auto` },
                            h('h3', { className: 'font-bold text-slate-800 text-lg mb-1' }, title),
                            h('button', { className: 'mt-4 bg-slate-800 text-white text-[10px] px-4 py-2 rounded-lg font-black w-full' }, 'MULAI QUIZ ⚡')
                        )
                    );
                }
            }));

            if (window.location.hash === '' || window.location.hash === '#/') {
                window.location.hash = '/collections/dashboard/entries/main_dashboard';
            }
        };
    </script>
</body>

</html>
