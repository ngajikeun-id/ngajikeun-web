name: Generate Site Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "content/about.json"
      - "content/articles/**"
      - "content/mentors/**"
      - "content/products/**"
      - "content/programs/**"
      - "content/quizzes/**"
      - "content/testimonials/**"
      - "scripts/generate-content-data.js"
      - ".github/workflows/generate-site-data.yml"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate aggregate site data
        run: node scripts/generate-content-data.js

      - name: Commit generated data
        run: |
          if git diff --quiet -- content/data/site-data.json; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/data/site-data.json
          git commit -m "chore: update aggregated site data"
          git push
